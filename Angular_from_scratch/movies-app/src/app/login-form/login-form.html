<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="row">
        <div class="col">
            <label for="usr" class="form-label">User name</label>
            <input id="usr" class="form-control" formControlName="usr" />
        </div>
        <div class="col">
            <label for="pwd" class="form-label">Password</label>
            <input id="pwd" class="form-control" type="password" formControlName="pwd" />
        </div>
    </div>
    <button class="btn btn-primary" type="submit" [disabled]="loginForm.invalid">Login</button>
</form>
